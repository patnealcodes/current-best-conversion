# Cloudflare Workers configuration — used by the GitHub-connected Workers
# build (`npx wrangler deploy`) and by local `wrangler dev`.
# The name must match the Worker that Cloudflare created for this repo.
name = "current-best-conversion"
main = "worker/index.ts"
compatibility_date = "2026-06-01"

[assets]
directory = "dist"
binding = "ASSETS"
# Only these routes invoke the Worker; everything else is served directly
# from the static assets with no Worker execution.
run_worker_first = ["/poe-api/*", "/poe-img/*"]

# Cross-user cache for poe.ninja responses (see worker/proxy.ts). This is the
# SAME namespace poe2-runeshape-rewards binds, so both apps share one central
# cache — identical upstream requests hit the same `ninja:` keys.
[[kv_namespaces]]
binding = "POE_NINJA_CACHE"
id = "0acd0213b42c4bfea7dee56c1ea3e035"
preview_id = "08ed861917c740969386edac45aaaf94"

[vars]
# Staleness window for the poe.ninja KV cache, in seconds. Mirrors
# POE_NINJA_CACHE_TTL_SECONDS in poe2-runeshape-rewards — keep them aligned so
# the shared entries have one consistent freshness policy.
POE_NINJA_CACHE_TTL_SECONDS = "7200"
