# Cloudflare Workers configuration — used by the GitHub-connected Workers
# build (`npx wrangler deploy`) and by local `wrangler dev`.
# The name must match the Worker that Cloudflare created for this repo.
name = "current-best-conversion"
main = "worker/index.ts"
compatibility_date = "2026-06-01"

[assets]
directory = "dist"
binding = "ASSETS"
# Only these routes invoke the Worker; everything else is served directly
# from the static assets with no Worker execution.
run_worker_first = ["/poe-api/*", "/poe-img/*"]

[vars]
# Edge-cache lifetime for proxied poe.ninja API responses (minutes).
# Keep aligned with VITE_CACHE_TTL_MINUTES (the browser-side cache) in .env.
CACHE_TTL_MINUTES = "5"
